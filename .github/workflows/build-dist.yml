---
name: build-dist
on:
  workflow_dispatch:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: true
      - name: Information
        run: |
          python3 -V
          python3 -W ignore -m pip --disable-pip-version-check list
          bin/skonfig -V
      - name: Build sdist
        run: |
          make sdist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.tar*
          archive: false
      - name: Build zdist
        run: |
          make zdist
      - name: Upload zdist
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.pyz
          archive: false
      - name: Build wheel
        run: |
          make wheel
      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.whl
          archive: false
      - name: Clean
        run: |
          make clean
